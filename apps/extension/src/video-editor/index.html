<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sniptale</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        height: 100%;
        background: var(--sniptale-color-surface-canvas);
        color: var(--sniptale-color-text-primary);
        font-family:
          'Sniptale Sans', 'Manrope Variable', 'Manrope', 'Segoe UI', 'Helvetica Neue', Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--sniptale-color-border-subtle);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--sniptale-color-border-strong);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--sniptale-color-text-dim);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
