<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sniptale</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 392px;
        height: 560px;
        min-width: 392px;
        min-height: 560px;
        max-width: 392px;
        max-height: 560px;
        overflow: hidden;
        background: var(--sniptale-color-surface-canvas, #0f172a);
        color: var(--sniptale-color-text-primary, #e5edf8);
      }

      body {
        overflow: hidden;
        font-family:
          'Sniptale Sans', 'Manrope Variable', 'Manrope', 'Segoe UI', 'Helvetica Neue', Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .popup-startup-shell {
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        padding: 12px;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 34%),
          radial-gradient(circle at bottom, rgba(16, 185, 129, 0.08), transparent 38%),
          var(--sniptale-color-surface-canvas, #0f172a);
      }

      .popup-startup-shell__tabs,
      .popup-startup-shell__card,
      .popup-startup-shell__footer {
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 10px 24px rgba(2, 6, 23, 0.18);
      }

      .popup-startup-shell__tabs {
        height: 42px;
      }

      .popup-startup-shell__card {
        flex: 1;
        padding: 16px;
      }

      .popup-startup-shell__footer {
        height: 44px;
      }

      .popup-startup-shell__line {
        display: block;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.2);
        animation: popup-startup-pulse 1.2s ease-in-out infinite;
      }

      .popup-startup-shell__line + .popup-startup-shell__line {
        margin-top: 12px;
      }

      @keyframes popup-startup-pulse {
        0%,
        100% {
          opacity: 0.72;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="popup-startup-shell" aria-hidden="true">
        <div class="popup-startup-shell__tabs"></div>
        <div class="popup-startup-shell__card">
          <span class="popup-startup-shell__line" style="width: 96px; height: 14px"></span>
          <span class="popup-startup-shell__line" style="width: 100%; height: 48px"></span>
          <span class="popup-startup-shell__line" style="width: 84%; height: 12px"></span>
          <span class="popup-startup-shell__line" style="width: 68%; height: 12px"></span>
        </div>
        <div class="popup-startup-shell__footer"></div>
      </div>
    </div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
